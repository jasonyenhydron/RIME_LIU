__build_info:
  rime_version: 1.13.1
  timestamps:
    default: 1749012323
    default.custom: 1774597433
    easy_en.custom: 1772533570
    easy_en.schema: 1772533569
    key_bindings: 1749012323
    key_bindings.custom: 0
    punctuation: 1749012323
    punctuation.custom: 0
easy_en:
  split_sentence: true
  use_wordninja_py: false
  use_wordninja_rs: false
  use_wordninja_rs_lua_module: false
  wordninja_rs_lua_module_path: "/usr/lib/lua/5.4/wordninja.so"
  wordninja_rs_path: "/usr/bin/wordninja"
engine:
  filters:
    - uniquifier
    - "lua_filter@easy_en_enhance_filter"
  processors:
    - ascii_composer
    - key_binder
    - speller
    - recognizer
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator
    - punct_translator
key_binder:
  bindings:
    - {accept: "Control+slash", select: liur, when: always}
    - {accept: period, send: period, when: has_menu}
    - {accept: "Control+period", toggle: simplification, when: always}
    - {accept: "Control+apostrophe", toggle: liu_w2c, when: always}
    - {accept: "Control+comma", toggle: extended_charset, when: always}
    - {accept: "Shift+space", toggle: full_shape, when: always}
    - {accept: KP_1, send: 1, when: has_menu}
    - {accept: KP_2, send: 2, when: has_menu}
    - {accept: KP_3, send: 3, when: has_menu}
    - {accept: KP_4, send: 4, when: has_menu}
    - {accept: KP_5, send: 5, when: has_menu}
    - {accept: KP_6, send: 6, when: has_menu}
    - {accept: KP_7, send: 7, when: has_menu}
    - {accept: KP_8, send: 8, when: has_menu}
    - {accept: KP_9, send: 9, when: has_menu}
    - {accept: "Control+k", send: "Shift+Delete", when: composing}
    - {accept: "Control+slash", select: liur, when: always}
  import_preset: default
menu:
  alternative_select_keys: 123456789
  page_size: 9
recognizer:
  import_preset: default
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    uppercase: ""
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
schema:
  author:
    - "Patrick <ipatrickmac@gmail.com>"
    - "BlindingDark <blindingdark@outlook.com>"
  description: "Easy English"
  name: "Easy English"
  schema_id: easy_en
  version: 0.9.1
speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"
switches:
  - name: ascii_mode
    reset: 0
    states: ["ASCII-OFF", "ASCII-ON"]
  - name: is_easy_en
    reset: 1
translator:
  comment_format:
    - "xform/^.+$//"
  dictionary: easy_en
  spelling_hints: 9