  alphabet: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/:`'"
  prefix: "``"
  suffix: ""
  tag: extended_mode
  tips: ""
fancy_lower:
  alphabet: "abcdefghijklmnopqrstuvwxyz.`"
  prefix: "`//"
  tag: fancy_lower
  tips: "《變體aa》▸"
fancy_number:
  alphabet: "0123456789.'`"
  prefix: "`/'"
  tag: fancy_number
  tips: "《變體數字》▸"
fancy_title:
  alphabet: "abcdefghijklmnopqrstuvwxyz.`"
  prefix: "`/"
  tag: fancy_title
  tips: "《變體Aa》▸"
fancy_upper:
  alphabet: "abcdefghijklmnopqrstuvwxyz.`"
  prefix: "`///"
  tag: fancy_upper
  tips: "《變體AA》▸"
fixed:
  comment_format:
    - "xform/^~.*(.)$/▸⟨$1⟩"
  db_class: tabledb
  dictionary: liur.extended
  disable_user_dict_for_patterns:
    - "^[',.].*$"
  enable_charset_filter: false
  enable_encoder: true
  enable_sentence: false
  enable_user_dict: true
  encode_commit_history: false
  initial_quality: 100
  max_phrase_length: 10
help_mode:
  prefix: ",,h"
  tag: help_mode
  tips: "《按鍵說明》▸"
key_binder:
  bindings:
    - {accept: "Control+slash", select: liur, when: always}
    - {accept: period, send: period, when: has_menu}
    - {accept: "Control+period", toggle: simplification, when: always}
    - {accept: "Control+apostrophe", toggle: liu_w2c, when: always}
    - {accept: "Control+comma", toggle: extended_charset, when: always}
    - {accept: "Shift+space", toggle: full_shape, when: always}
    - {accept: KP_1, send: 1, when: has_menu}
    - {accept: KP_2, send: 2, when: has_menu}
    - {accept: KP_3, send: 3, when: has_menu}
    - {accept: KP_4, send: 4, when: has_menu}
    - {accept: KP_5, send: 5, when: has_menu}
    - {accept: KP_6, send: 6, when: has_menu}
    - {accept: KP_7, send: 7, when: has_menu}
    - {accept: KP_8, send: 8, when: has_menu}
    - {accept: KP_9, send: 9, when: has_menu}
    - {accept: "Control+k", send: "Shift+Delete", when: composing}
    - {accept: Tab, send: Page_Down, when: has_menu}
    - {accept: "Shift+Tab", send: Page_Up, when: has_menu}
    - {accept: "Shift+Up", send: Page_Up, when: has_menu}
    - {accept: "Shift+Down", send: Page_Down, when: has_menu}
    - {accept: "Control+slash", select: easy_en, when: always}
    - {accept: space, send: Escape, when: composing}
    - {accept: space, send: space, when: has_menu}
    - {accept: space, option: {liu_phonetic: 0}, send: space, when: has_menu}
  import_preset: default
