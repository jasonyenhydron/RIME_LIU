recognizer:
  import_preset: default
  patterns:
    code_decode: "^,,x[a-z\\-;,']*$"
    email: "^[a-z][-_.0-9a-z]*@.*$"
    extended_mode: "^``[a-zA-Z/0-9:`']*`?$"
    fancy_lower: "`//[a-z.]*`?$"
    fancy_number: "`/'[0-9.']*`?$"
    fancy_title: "`/[a-z.]*`?$"
    fancy_upper: "`///[a-z.]*`?$"
    help_mode: "^,,h$"
    liurqry: "^;;[a-z']*'?$"
    mkst: "^;(?![';])[a-z,.'~]*$"
    number_variant: "(?<![=`/])`'[0-9]{0,2}`?$"
    pinyin: "^;'[a-z0-9;,/<'-]*'?$"
    symbols: "^`([0-9]{0,2}|[a-z])`?$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
